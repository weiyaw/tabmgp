expdir: ???
batch: null
loss: likelihood
seed: 999
run_name: copula-${init}

init: std
rollout_times: 100
forward_steps: [250, 500, 1000, 2000]
num_y_grid: 100

trace: True
resolution: 50

lastrun: ${now:%Y-%m-%dT%H:%M:%S%z}
git: ${githash:}

hydra:
  run:
    dir: "./${expdir}"
  output_subdir: null
  job_logging:
    handlers:
      file:
        filename: "./${expdir}/logs/${run_name}.log"
        delay: true
