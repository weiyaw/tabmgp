defaults:
  - dgp: regression
  - _self_

data_size: 500
seed: 999

id: ${now:%Y-%m-%d}
lastrun: ${now:%Y-%m-%dT%H:%M:%S%z}
git: ${githash:}

hydra:
  run:
    dir: "./outputs/${id}/\
      ${print_dgp:${dgp}}
      data=${data_size}
      seed=${seed}"
  sweep:
    dir: ${hydra.run.dir}
    subdir: .
