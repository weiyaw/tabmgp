defaults:
  - dgp: regression
  - _self_

data_size: 500
seed: 999
run_name: dgp

id: ${now:%Y-%m-%d}
lastrun: ${now:%Y-%m-%dT%H:%M:%S%z}
git: ${githash:}

hydra:
  run:
    dir: "./outputs/${id}/\
      ${print_dgp:${dgp}}
      data=${data_size}
      seed=${seed}"
  output_subdir: null
  job_logging:
    handlers:
      file:
        filename: "${hydra.runtime.output_dir}/logs/${run_name}.log"
        delay: true
